<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Casa">
<title>Tarefas de Casa</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: rgba(0,0,0,0.05); }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: -apple-system, Helvetica, Arial, sans-serif;
  background: #f5f5f5;
  color: #222;
  font-size: 18px;
}
.header {
  display: -webkit-flex; display: flex;
  -webkit-justify-content: space-between; justify-content: space-between;
  -webkit-align-items: center; align-items: center;
  padding: 10px 20px;
  background: #fff;
  border-bottom: 2px solid #e0e0e0;
}
.header h1 { font-size: 22px; font-weight: 700; color: #333; }
.score-bar {
  display: -webkit-flex; display: flex;
  gap: 20px;
  font-size: 20px;
  font-weight: 700;
}
.score-bruno { color: #1565c0; }
.score-nana { color: #c62828; }
.columns {
  display: -webkit-flex; display: flex;
  height: calc(100% - 52px);
  overflow: hidden;
}
.column {
  -webkit-flex: 1; flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 10px 14px;
}
.column:first-child { border-right: 2px solid #e0e0e0; }
.col-header {
  text-align: center;
  font-size: 22px;
  font-weight: 800;
  padding: 8px 0;
  margin-bottom: 8px;
  border-radius: 10px;
  letter-spacing: 0.5px;
}
.col-header.bruno { background: #e3f2fd; color: #1565c0; }
.col-header.nana { background: #fce4ec; color: #c62828; }
.freq-group { margin-bottom: 12px; }
.freq-label {
  font-size: 14px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: #999;
  padding: 4px 4px 2px;
  font-weight: 700;
  border-bottom: 1px solid #e0e0e0;
  margin-bottom: 4px;
}
.task-row {
  display: -webkit-flex; display: flex;
  -webkit-align-items: center; align-items: center;
  padding: 10px 8px;
  margin: 3px 0;
  border-radius: 10px;
  background: #fff;
  cursor: pointer;
  -webkit-user-select: none;
  min-height: 52px;
  border: 1px solid #eee;
}
.task-row:active { background: #f0f0f0; }
.task-row.done { opacity: 0.35; }
.task-row.done .task-name { text-decoration: line-through; }
.checkbox {
  width: 36px; height: 36px;
  border: 3px solid #ccc;
  border-radius: 8px;
  margin-right: 12px;
  -webkit-flex-shrink: 0; flex-shrink: 0;
  display: -webkit-flex; display: flex;
  -webkit-align-items: center; align-items: center;
  -webkit-justify-content: center; justify-content: center;
  font-size: 22px;
  color: #fff;
}
.task-row.done .checkbox {
  background: #43a047;
  border-color: #43a047;
}
.task-name {
  -webkit-flex: 1; flex: 1;
  font-size: 19px;
  line-height: 1.3;
  font-weight: 500;
}
.task-pts {
  font-size: 14px;
  color: #aaa;
  margin-left: 8px;
  -webkit-flex-shrink: 0; flex-shrink: 0;
  font-weight: 600;
}
.demanda-toggle {
  display: -webkit-flex; display: flex;
  -webkit-align-items: center; align-items: center;
  padding: 8px 4px;
  cursor: pointer;
  -webkit-user-select: none;
  font-size: 14px;
  color: #999;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  border-bottom: 1px solid #e0e0e0;
  margin-bottom: 4px;
}
.demanda-toggle .arrow {
  display: inline-block;
  margin-right: 6px;
  -webkit-transition: -webkit-transform 0.2s;
  transition: transform 0.2s;
}
.demanda-toggle.open .arrow {
  -webkit-transform: rotate(90deg);
  transform: rotate(90deg);
}
.demanda-list { display: none; }
.demanda-list.open { display: block; }
.loading, .error-msg { text-align: center; padding: 40px; font-size: 18px; }
.loading { color: #999; }
.error-msg { color: #c62828; }
</style>
</head>
<body>

<div class="header">
  <h1>Tarefas de Casa</h1>
  <div class="score-bar">
    <span class="score-bruno" id="scoreBruno">Bruno: 0</span>
    <span class="score-nana" id="scoreNana">Nana: 0</span>
  </div>
</div>

<div class="columns">
  <div class="column" id="colBruno">
    <div class="col-header bruno">Bruno</div>
    <div class="loading" id="loadBruno">Carregando...</div>
  </div>
  <div class="column" id="colNana">
    <div class="col-header nana">Nana</div>
    <div class="loading" id="loadNana">Carregando...</div>
  </div>
</div>

<script src="config.js"></script>
<script>
(function() {
  "use strict";

  var C = window.CASA_CONFIG || {};
  var API_BASE = C.API_BASE || "/api/v1";
  var BASE_ID = C.BASE_ID || "";
  var TABLE_TAREFAS = C.TABLE_TAREFAS || "";
  var TABLE_REGISTROS = C.TABLE_REGISTROS || "";

  var tarefas = [];
  var allRegistros = [];
  var busy = false;
  var demandaOpen = { Bruno: false, Nana: false };

  // ---- Date helpers (ES5) ----
  function pad(n) { return n < 10 ? "0" + n : "" + n; }

  function todayStr() {
    var d = new Date();
    return d.getFullYear() + "-" + pad(d.getMonth() + 1) + "-" + pad(d.getDate());
  }

  function mondayStr() {
    var d = new Date();
    var day = d.getDay() || 7; // sunday=7
    d.setDate(d.getDate() - day + 1);
    return d.getFullYear() + "-" + pad(d.getMonth() + 1) + "-" + pad(d.getDate());
  }

  function monthStartStr() {
    var d = new Date();
    return d.getFullYear() + "-" + pad(d.getMonth() + 1) + "-01";
  }

  function bimestreStartStr() {
    var d = new Date();
    var m = d.getMonth(); // 0-indexed
    var bm = m - (m % 2); // 0,2,4,6,8,10
    return d.getFullYear() + "-" + pad(bm + 1) + "-01";
  }

  // Returns the start date of the current period for a task
  function periodStart(task) {
    var p = task.frequencia_periodo;
    if (p === "dia") return todayStr();
    if (p === "semana") return mondayStr();
    if (p === "mes") return monthStartStr();
    if (p === "2 meses") return bimestreStartStr();
    return todayStr(); // fallback: daily
  }

  // Check if task is done in its current period
  function isDoneInPeriod(task) {
    var start = periodStart(task);
    for (var i = 0; i < allRegistros.length; i++) {
      var r = allRegistros[i];
      if (r.tarefa_id === task.Id && r.data_hora && r.data_hora >= start) {
        return r;
      }
    }
    return null;
  }

  // ---- API ----
  function xhr(method, url, body, cb) {
    var req = new XMLHttpRequest();
    req.open(method, url, true);
    req.setRequestHeader("Content-Type", "application/json");
    req.onreadystatechange = function() {
      if (req.readyState === 4) {
        if (req.status >= 200 && req.status < 300) {
          try { cb(null, JSON.parse(req.responseText)); }
          catch(e) { cb(null, req.responseText); }
        } else {
          cb(req.status + ": " + req.responseText);
        }
      }
    };
    req.send(body ? JSON.stringify(body) : null);
  }

  function loadTarefas(cb) {
    var url = API_BASE + "/db/data/noco/" + BASE_ID + "/" + TABLE_TAREFAS
      + "?where=(ativa,eq,1)&sort=ordem&limit=200";
    xhr("GET", url, null, function(err, data) {
      if (err) return cb(err);
      tarefas = data.list || [];
      cb(null);
    });
  }

  // Load all registros from the earliest possible period (bimestre start)
  function loadRegistros(cb) {
    var desde = bimestreStartStr();
    var url = API_BASE + "/db/data/noco/" + BASE_ID + "/" + TABLE_REGISTROS
      + "?where=(data_hora,gte,exactDate," + desde + ")&limit=1000";
    xhr("GET", url, null, function(err, data) {
      if (err) return cb(err);
      allRegistros = data.list || [];
      cb(null);
    });
  }

  function calcScores() {
    var hoje = todayStr();
    var scores = { Bruno: 0, Nana: 0 };
    for (var i = 0; i < allRegistros.length; i++) {
      var r = allRegistros[i];
      if (r.data_hora && r.data_hora >= hoje && r.pessoa && scores[r.pessoa] !== undefined) {
        scores[r.pessoa] += (r.pontos || 0);
      }
    }
    return scores;
  }

  // ---- Rendering ----
  function freqLabel(t) {
    var p = t.frequencia_periodo;
    if (!p) return "sem frequencia";
    if (p === "dia") return "diario";
    if (p === "semana") return "semanal";
    if (p === "mes") return "mensal";
    if (p === "2 meses") return "bimestral";
    return p;
  }

  function freqOrder(label) {
    if (label === "diario") return 0;
    if (label === "semanal") return 1;
    if (label === "mensal") return 2;
    if (label === "bimestral") return 3;
    return 4;
  }

  function buildTaskRow(t) {
    var reg = isDoneInPeriod(t);
    var done = !!reg;

    var row = document.createElement("div");
    row.className = "task-row" + (done ? " done" : "");

    var cb = document.createElement("div");
    cb.className = "checkbox";
    cb.textContent = done ? "\u2713" : "";
    row.appendChild(cb);

    var name = document.createElement("div");
    name.className = "task-name";
    name.textContent = t.titulo;
    row.appendChild(name);

    var pts = document.createElement("div");
    pts.className = "task-pts";
    pts.textContent = (t.dificuldade || 1) + "pt";
    row.appendChild(pts);

    (function(rowEl, taskData, isDone) {
      rowEl.addEventListener("click", function() {
        toggleTask(taskData, isDone);
      });
    })(row, t, done);

    return row;
  }

  function renderColumn(containerId, pessoa) {
    var col = document.getElementById(containerId);
    var header = col.querySelector(".col-header");
    while (col.lastChild !== header) {
      col.removeChild(col.lastChild);
    }

    var mine = [];
    var mineOnDemand = [];
    for (var i = 0; i < tarefas.length; i++) {
      if (tarefas[i].pessoa === pessoa) {
        if (tarefas[i].sob_demanda) {
          mineOnDemand.push(tarefas[i]);
        } else {
          mine.push(tarefas[i]);
        }
      }
    }

    if (mine.length === 0 && mineOnDemand.length === 0) {
      var empty = document.createElement("div");
      empty.className = "loading";
      empty.textContent = "Nenhuma tarefa";
      col.appendChild(empty);
      return;
    }

    // Group by frequency
    var groups = {};
    var groupOrder = [];
    for (var j = 0; j < mine.length; j++) {
      var t = mine[j];
      var label = freqLabel(t);
      if (!groups[label]) {
        groups[label] = [];
        groupOrder.push(label);
      }
      groups[label].push(t);
    }
    groupOrder.sort(function(a, b) { return freqOrder(a) - freqOrder(b); });

    for (var g = 0; g < groupOrder.length; g++) {
      var gLabel = groupOrder[g];
      var tasks = groups[gLabel];

      var grp = document.createElement("div");
      grp.className = "freq-group";

      var lbl = document.createElement("div");
      lbl.className = "freq-label";
      lbl.textContent = gLabel;
      grp.appendChild(lbl);

      for (var k = 0; k < tasks.length; k++) {
        grp.appendChild(buildTaskRow(tasks[k]));
      }
      col.appendChild(grp);
    }

    // On-demand collapsible
    if (mineOnDemand.length > 0) {
      var toggle = document.createElement("div");
      toggle.className = "demanda-toggle" + (demandaOpen[pessoa] ? " open" : "");
      toggle.innerHTML = '<span class="arrow">\u25B6</span> Sob demanda (' + mineOnDemand.length + ')';

      var list = document.createElement("div");
      list.className = "demanda-list" + (demandaOpen[pessoa] ? " open" : "");

      for (var m = 0; m < mineOnDemand.length; m++) {
        list.appendChild(buildTaskRow(mineOnDemand[m]));
      }

      (function(toggleEl, listEl, p) {
        toggleEl.addEventListener("click", function() {
          demandaOpen[p] = !demandaOpen[p];
          toggleEl.className = "demanda-toggle" + (demandaOpen[p] ? " open" : "");
          listEl.className = "demanda-list" + (demandaOpen[p] ? " open" : "");
        });
      })(toggle, list, pessoa);

      col.appendChild(toggle);
      col.appendChild(list);
    }
  }

  // ---- Toggle ----
  function toggleTask(task, currentlyDone) {
    if (busy) return;
    busy = true;

    if (currentlyDone) {
      var reg = isDoneInPeriod(task);
      if (!reg) { busy = false; return; }
      var url = API_BASE + "/db/data/noco/" + BASE_ID + "/" + TABLE_REGISTROS + "/" + reg.Id;
      xhr("DELETE", url, null, function(err) {
        busy = false;
        if (!err) {
          // remove from allRegistros
          for (var i = allRegistros.length - 1; i >= 0; i--) {
            if (allRegistros[i].Id === reg.Id) { allRegistros.splice(i, 1); break; }
          }
          render();
        }
      });
    } else {
      var body = {
        tarefa_id: task.Id,
        titulo: task.titulo,
        pessoa: task.pessoa,
        pontos: task.dificuldade || 1,
        data_hora: new Date().toISOString()
      };
      var url2 = API_BASE + "/db/data/noco/" + BASE_ID + "/" + TABLE_REGISTROS;
      xhr("POST", url2, body, function(err, data) {
        busy = false;
        if (!err && data) {
          allRegistros.push(data);
          render();
        }
      });
    }
  }

  function render() {
    var scores = calcScores();
    document.getElementById("scoreBruno").textContent = "Bruno: " + scores.Bruno + "pt";
    document.getElementById("scoreNana").textContent = "Nana: " + scores.Nana + "pt";
    renderColumn("colBruno", "Bruno");
    renderColumn("colNana", "Nana");
  }

  function init() {
    loadTarefas(function(err) {
      if (err) {
        document.getElementById("loadBruno").textContent = "Erro: " + err;
        document.getElementById("loadBruno").className = "error-msg";
        return;
      }
      loadRegistros(function(err2) {
        if (err2) {
          document.getElementById("loadBruno").textContent = "Erro: " + err2;
          document.getElementById("loadBruno").className = "error-msg";
          return;
        }
        render();
      });
    });
  }

  init();
  setInterval(function() {
    loadTarefas(function(err) {
      if (!err) {
        loadRegistros(function(err2) {
          if (!err2) render();
        });
      }
    });
  }, 60000);

})();
</script>
</body>
</html>
