<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casa Tasks - Admin</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #0f0f23;
  color: #e0e0e0;
  padding: 20px;
  max-width: 900px;
  margin: 0 auto;
}
h1 { color: #e94560; margin-bottom: 8px; font-size: 24px; }
h2 { color: #4fc3f7; margin: 24px 0 12px; font-size: 18px; }
.subtitle { color: #888; font-size: 13px; margin-bottom: 20px; }

/* Tabs */
.tabs { display: flex; gap: 4px; margin-bottom: 20px; }
.tab {
  padding: 8px 16px; border: none; border-radius: 6px 6px 0 0;
  background: #1a1a2e; color: #888; cursor: pointer; font-size: 14px;
}
.tab.active { background: #16213e; color: #e94560; font-weight: 600; }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* Form */
.form-row { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; align-items: end; }
.form-group { display: flex; flex-direction: column; gap: 4px; }
.form-group label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
input, select {
  padding: 8px 12px; border: 1px solid #333; border-radius: 6px;
  background: #1a1a2e; color: #e0e0e0; font-size: 14px;
}
input:focus, select:focus { outline: none; border-color: #4fc3f7; }
input[type="number"] { width: 70px; }
.btn {
  padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer;
  font-size: 13px; font-weight: 600;
}
.btn-primary { background: #e94560; color: #fff; }
.btn-primary:hover { background: #c23152; }
.btn-secondary { background: #333; color: #ccc; }
.btn-secondary:hover { background: #444; }
.btn-danger { background: #5a1a1a; color: #e94560; }
.btn-danger:hover { background: #7a2a2a; }
.btn-sm { padding: 4px 10px; font-size: 12px; }

/* Table */
table { width: 100%; border-collapse: collapse; margin-top: 8px; }
th { text-align: left; padding: 8px; color: #888; font-size: 12px; border-bottom: 1px solid #333; }
td { padding: 6px 8px; border-bottom: 1px solid #1a1a2e; font-size: 13px; }
tr:hover { background: #16213e; }
.badge {
  display: inline-block; padding: 2px 8px; border-radius: 10px;
  font-size: 11px; font-weight: 600;
}
.badge-bruno { background: #0d47a1; color: #4fc3f7; }
.badge-nana { background: #880e4f; color: #f48fb1; }
.badge-active { background: #1b5e20; color: #81c784; }
.badge-inactive { background: #333; color: #888; }

/* Score board */
.scoreboard { display: flex; gap: 20px; margin-bottom: 20px; }
.score-card {
  flex: 1; padding: 16px; border-radius: 10px; text-align: center;
}
.score-card.bruno { background: #0d47a1; }
.score-card.nana { background: #880e4f; }
.score-card .name { font-size: 14px; opacity: 0.8; }
.score-card .pts { font-size: 32px; font-weight: 700; }
.score-card .label { font-size: 11px; opacity: 0.6; }

/* History */
.history-filters { display: flex; gap: 8px; margin-bottom: 12px; align-items: center; }
.history-item {
  display: flex; align-items: center; gap: 8px; padding: 6px 8px;
  background: #16213e; border-radius: 6px; margin-bottom: 4px; font-size: 13px;
}
.history-time { color: #888; font-size: 11px; min-width: 50px; }
.history-task { flex: 1; }
.history-pts { color: #4fc3f7; font-size: 12px; font-weight: 600; }

.msg { padding: 8px 12px; border-radius: 6px; margin-bottom: 12px; font-size: 13px; }
.msg-ok { background: #1b5e20; color: #81c784; }
.msg-err { background: #5a1a1a; color: #e94560; }

.edit-row input, .edit-row select { font-size: 12px; padding: 4px 6px; }
</style>
</head>
<body>

<h1>Casa Tasks</h1>
<p class="subtitle">Painel de administra&ccedil;&atilde;o</p>

<div class="tabs">
  <button class="tab active" onclick="showTab('tarefas')">Tarefas</button>
  <button class="tab" onclick="showTab('historico')">Hist&oacute;rico</button>
  <button class="tab" onclick="showTab('placar')">Placar</button>
</div>

<div id="msg"></div>

<!-- TAB: Tarefas -->
<div id="tab-tarefas" class="tab-content active">
  <h2>Nova Tarefa</h2>
  <div class="form-row">
    <div class="form-group">
      <label>T&iacute;tulo</label>
      <input type="text" id="newTitulo" placeholder="Nome da tarefa" style="width:220px">
    </div>
    <div class="form-group">
      <label>Pessoa</label>
      <select id="newPessoa"><option value="Bruno">Bruno</option><option value="Nana">Nana</option></select>
    </div>
    <div class="form-group">
      <label>C&ocirc;modo</label>
      <select id="newComodo">
        <option>Banheiro</option><option>Casa</option><option>Cozinha</option>
        <option>Externa</option><option>Quarto</option><option value="Servi&ccedil;o">Servi&ccedil;o</option><option value="Escrit&oacute;rio">Escrit&oacute;rio</option>
      </select>
    </div>
    <div class="form-group">
      <label>Dificuldade</label>
      <input type="number" id="newDificuldade" value="1" min="1" max="5">
    </div>
    <div class="form-group">
      <label>Freq. Qtd</label>
      <input type="number" id="newFreqQtd" min="0" placeholder="-">
    </div>
    <div class="form-group">
      <label>Freq. Per&iacute;odo</label>
      <select id="newFreqPeriodo"><option value="">-</option><option value="dia">dia</option><option value="semana">semana</option><option value="mes">m&ecirc;s</option></select>
    </div>
    <button class="btn btn-primary" onclick="addTask()">Adicionar</button>
  </div>

  <h2>Tarefas Cadastradas</h2>
  <table>
    <thead>
      <tr>
        <th>T&iacute;tulo</th><th>Pessoa</th><th>C&ocirc;modo</th><th>Dif.</th>
        <th>Freq.</th><th>Ativa</th><th>Ordem</th><th>A&ccedil;&otilde;es</th>
      </tr>
    </thead>
    <tbody id="taskList"></tbody>
  </table>
</div>

<!-- TAB: Historico -->
<div id="tab-historico" class="tab-content">
  <h2>Hist&oacute;rico de Conclus&otilde;es</h2>
  <div class="history-filters">
    <select id="histPessoa" onchange="loadHistory()">
      <option value="">Todos</option><option>Bruno</option><option>Nana</option>
    </select>
    <select id="histPeriodo" onchange="loadHistory()">
      <option value="hoje">Hoje</option>
      <option value="semana">Esta semana</option>
      <option value="mes">Este m&ecirc;s</option>
      <option value="tudo">Tudo</option>
    </select>
  </div>
  <div id="historyList"></div>
</div>

<!-- TAB: Placar -->
<div id="tab-placar" class="tab-content">
  <h2>Placar</h2>
  <div class="history-filters">
    <select id="placarPeriodo" onchange="loadPlacar()">
      <option value="hoje">Hoje</option>
      <option value="semana">Esta semana</option>
      <option value="mes">Este m&ecirc;s</option>
      <option value="tudo">Todo o per&iacute;odo</option>
    </select>
  </div>
  <div class="scoreboard">
    <div class="score-card bruno">
      <div class="name">Bruno</div>
      <div class="pts" id="placarBruno">0</div>
      <div class="label">pontos</div>
    </div>
    <div class="score-card nana">
      <div class="name">Nana</div>
      <div class="pts" id="placarNana">0</div>
      <div class="label">pontos</div>
    </div>
  </div>
  <div id="placarDetail"></div>
</div>

<script src="config.js"></script>
<script>
const C = window.CASA_CONFIG || {};
const API_BASE = C.API_BASE || "";
const TOKEN = C.TOKEN || "";
const BASE_ID = C.BASE_ID || "";
const TABLE_TAREFAS = C.TABLE_TAREFAS || "";
const TABLE_REGISTROS = C.TABLE_REGISTROS || "";

async function api(method, path, body) {
  const res = await fetch(API_BASE + path, {
    method,
    headers: { "xc-token": TOKEN, "Content-Type": "application/json" },
    body: body ? JSON.stringify(body) : undefined
  });
  if (!res.ok) throw new Error(await res.text());
  return res.status === 204 ? null : res.json();
}

function showMsg(text, ok) {
  const el = document.getElementById("msg");
  el.innerHTML = `<div class="msg ${ok ? 'msg-ok' : 'msg-err'}">${text}</div>`;
  setTimeout(() => el.innerHTML = "", 3000);
}

// Tabs
function showTab(name) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  document.querySelector(`.tab[onclick*="${name}"]`).classList.add('active');
  if (name === 'historico') loadHistory();
  if (name === 'placar') loadPlacar();
}

// Tasks CRUD
async function loadTasks() {
  try {
    const data = await api("GET", `/db/data/noco/${BASE_ID}/${TABLE_TAREFAS}?sort=ordem&limit=200`);
    renderTasks(data.list || []);
  } catch(e) { showMsg("Erro ao carregar: " + e.message, false); }
}

function renderTasks(tasks) {
  const tbody = document.getElementById("taskList");
  tbody.innerHTML = tasks.map(t => `
    <tr>
      <td>${t.titulo}</td>
      <td><span class="badge badge-${(t.pessoa||'').toLowerCase()}">${t.pessoa||'-'}</span></td>
      <td>${t.comodo||'-'}</td>
      <td>${t.dificuldade||'-'}</td>
      <td>${t.frequencia_qtd ? t.frequencia_qtd + 'x/' + (t.frequencia_periodo||'?') : '-'}</td>
      <td><span class="badge ${t.ativa ? 'badge-active' : 'badge-inactive'}">${t.ativa ? 'Sim' : 'N\u00e3o'}</span></td>
      <td>${t.ordem||'-'}</td>
      <td>
        <button class="btn btn-secondary btn-sm" onclick="toggleActive(${t.Id}, ${!t.ativa})">${t.ativa ? 'Desativar' : 'Ativar'}</button>
        <button class="btn btn-danger btn-sm" onclick="deleteTask(${t.Id})">Excluir</button>
      </td>
    </tr>
  `).join("");
}

async function addTask() {
  const titulo = document.getElementById("newTitulo").value.trim();
  if (!titulo) return showMsg("Preencha o t\u00edtulo", false);
  const body = {
    titulo,
    pessoa: document.getElementById("newPessoa").value,
    comodo: document.getElementById("newComodo").value,
    dificuldade: parseInt(document.getElementById("newDificuldade").value) || 1,
    ativa: true,
    ordem: 99
  };
  const fq = document.getElementById("newFreqQtd").value;
  const fp = document.getElementById("newFreqPeriodo").value;
  if (fq) body.frequencia_qtd = parseInt(fq);
  if (fp) body.frequencia_periodo = fp;
  try {
    await api("POST", `/db/data/noco/${BASE_ID}/${TABLE_TAREFAS}`, body);
    document.getElementById("newTitulo").value = "";
    showMsg("Tarefa adicionada!", true);
    loadTasks();
  } catch(e) { showMsg("Erro: " + e.message, false); }
}

async function toggleActive(id, newVal) {
  try {
    await api("PATCH", `/db/data/noco/${BASE_ID}/${TABLE_TAREFAS}/${id}`, { ativa: newVal });
    loadTasks();
  } catch(e) { showMsg("Erro: " + e.message, false); }
}

async function deleteTask(id) {
  if (!confirm("Excluir esta tarefa?")) return;
  try {
    await api("DELETE", `/db/data/noco/${BASE_ID}/${TABLE_TAREFAS}/${id}`);
    showMsg("Tarefa exclu\u00edda", true);
    loadTasks();
  } catch(e) { showMsg("Erro: " + e.message, false); }
}

// History
function dateFilter(periodo) {
  const now = new Date();
  if (periodo === "hoje") {
    const d = now.toISOString().slice(0, 10);
    return `(data_hora,gte,exactDate,${d})`;
  }
  if (periodo === "semana") {
    const day = now.getDay() || 7;
    const mon = new Date(now);
    mon.setDate(now.getDate() - day + 1);
    return `(data_hora,gte,exactDate,${mon.toISOString().slice(0,10)})`;
  }
  if (periodo === "mes") {
    const m = now.toISOString().slice(0, 7) + "-01";
    return `(data_hora,gte,exactDate,${m})`;
  }
  return "";
}

async function loadHistory() {
  const pessoa = document.getElementById("histPessoa").value;
  const periodo = document.getElementById("histPeriodo").value;
  let where = dateFilter(periodo);
  if (pessoa) where += (where ? "~and" : "") + `(pessoa,eq,${pessoa})`;
  try {
    const data = await api("GET", `/db/data/noco/${BASE_ID}/${TABLE_REGISTROS}?sort=-data_hora&limit=100${where ? '&where=' + where : ''}`);
    const list = data.list || [];
    document.getElementById("historyList").innerHTML = list.length === 0
      ? '<p style="color:#888">Nenhum registro</p>'
      : list.map(r => {
          const dt = r.data_hora ? new Date(r.data_hora) : null;
          const time = dt ? dt.toLocaleTimeString("pt-BR", {hour:"2-digit",minute:"2-digit"}) : "";
          const date = dt ? dt.toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit"}) : "";
          return `<div class="history-item">
            <span class="history-time">${date} ${time}</span>
            <span class="badge badge-${(r.pessoa||'').toLowerCase()}">${r.pessoa||'?'}</span>
            <span class="history-task">${r.titulo||'?'}</span>
            <span class="history-pts">+${r.pontos||0}pt</span>
          </div>`;
        }).join("");
  } catch(e) { document.getElementById("historyList").innerHTML = `<p class="msg-err">${e.message}</p>`; }
}

// Placar
async function loadPlacar() {
  const periodo = document.getElementById("placarPeriodo").value;
  const where = dateFilter(periodo);
  try {
    const data = await api("GET", `/db/data/noco/${BASE_ID}/${TABLE_REGISTROS}?limit=1000${where ? '&where=' + where : ''}&fields=pessoa,pontos,titulo`);
    const list = data.list || [];
    const scores = { Bruno: 0, Nana: 0 };
    const taskCount = { Bruno: {}, Nana: {} };
    for (const r of list) {
      if (r.pessoa && scores[r.pessoa] !== undefined) {
        scores[r.pessoa] += (r.pontos || 0);
        const key = r.titulo || "?";
        taskCount[r.pessoa][key] = (taskCount[r.pessoa][key] || 0) + 1;
      }
    }
    document.getElementById("placarBruno").textContent = scores.Bruno;
    document.getElementById("placarNana").textContent = scores.Nana;

    let detail = "<h2 style='margin-top:20px'>Detalhamento</h2>";
    for (const p of ["Bruno", "Nana"]) {
      const entries = Object.entries(taskCount[p]).sort((a,b) => b[1] - a[1]);
      if (entries.length > 0) {
        detail += `<h3 style="color:${p==='Bruno'?'#4fc3f7':'#f48fb1'};margin:12px 0 6px">${p}</h3>`;
        detail += entries.map(([t, c]) => `<div style="font-size:13px;padding:2px 0">${t}: <b>${c}x</b></div>`).join("");
      }
    }
    document.getElementById("placarDetail").innerHTML = detail;
  } catch(e) { showMsg("Erro: " + e.message, false); }
}

// Init
loadTasks();
</script>
</body>
</html>
