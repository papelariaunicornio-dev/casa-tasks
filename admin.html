<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casa Tasks - Admin</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #f5f5f5; color: #222; padding: 20px; max-width: 1100px; margin: 0 auto;
}
h1 { color: #1565c0; margin-bottom: 4px; font-size: 24px; }
h2 { color: #333; margin: 20px 0 10px; font-size: 18px; }
.subtitle { color: #888; font-size: 13px; margin-bottom: 16px; }

.tabs { display: flex; gap: 4px; margin-bottom: 16px; }
.tab {
  padding: 8px 16px; border: none; border-radius: 6px 6px 0 0;
  background: #e0e0e0; color: #666; cursor: pointer; font-size: 14px;
}
.tab.active { background: #fff; color: #1565c0; font-weight: 600; border-bottom: 2px solid #1565c0; }
.tab-content { display: none; }
.tab-content.active { display: block; }

.form-row { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; align-items: end; }
.form-group { display: flex; flex-direction: column; gap: 4px; }
.form-group label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
input, select {
  padding: 7px 10px; border: 1px solid #ccc; border-radius: 6px;
  background: #fff; color: #222; font-size: 14px;
}
input:focus, select:focus { outline: none; border-color: #1565c0; }
input[type="number"] { width: 65px; }
input[type="checkbox"] { width: 18px; height: 18px; }
.btn {
  padding: 7px 14px; border: none; border-radius: 6px; cursor: pointer;
  font-size: 13px; font-weight: 600;
}
.btn-primary { background: #1565c0; color: #fff; }
.btn-primary:hover { background: #0d47a1; }
.btn-secondary { background: #e0e0e0; color: #555; }
.btn-secondary:hover { background: #ccc; }
.btn-danger { background: #ffebee; color: #c62828; }
.btn-danger:hover { background: #ffcdd2; }
.btn-save { background: #e8f5e9; color: #2e7d32; }
.btn-save:hover { background: #c8e6c9; }
.btn-sm { padding: 4px 10px; font-size: 12px; }

table { width: 100%; border-collapse: collapse; margin-top: 8px; }
th { text-align: left; padding: 8px 6px; color: #888; font-size: 11px; border-bottom: 2px solid #ddd; text-transform: uppercase; }
td { padding: 5px 6px; border-bottom: 1px solid #eee; font-size: 13px; vertical-align: middle; }
tr:hover { background: #f9f9f9; }
td input, td select { font-size: 12px; padding: 4px 6px; }
td input[type="number"] { width: 55px; }
td input[type="checkbox"] { width: 16px; height: 16px; }

.badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
.badge-bruno { background: #e3f2fd; color: #1565c0; }
.badge-nana { background: #fce4ec; color: #c62828; }
.badge-active { background: #e8f5e9; color: #2e7d32; }
.badge-inactive { background: #eee; color: #999; }

.scoreboard { display: flex; gap: 20px; margin-bottom: 20px; }
.score-card { flex: 1; padding: 16px; border-radius: 10px; text-align: center; }
.score-card.bruno { background: #e3f2fd; color: #1565c0; }
.score-card.nana { background: #fce4ec; color: #c62828; }
.score-card .name { font-size: 14px; opacity: 0.7; }
.score-card .pts { font-size: 32px; font-weight: 700; }
.score-card .label { font-size: 11px; opacity: 0.5; }

.history-filters { display: flex; gap: 8px; margin-bottom: 12px; align-items: center; }
.history-item {
  display: flex; align-items: center; gap: 8px; padding: 6px 8px;
  background: #fff; border-radius: 6px; margin-bottom: 4px; font-size: 13px; border: 1px solid #eee;
}
.history-time { color: #999; font-size: 11px; min-width: 80px; }
.history-task { flex: 1; }
.history-pts { color: #1565c0; font-size: 12px; font-weight: 600; }

.msg { padding: 8px 12px; border-radius: 6px; margin-bottom: 12px; font-size: 13px; }
.msg-ok { background: #e8f5e9; color: #2e7d32; }
.msg-err { background: #ffebee; color: #c62828; }
.dirty { background: #fffde7 !important; }
</style>
</head>
<body>

<h1>Casa Tasks</h1>
<p class="subtitle">Painel de administra&ccedil;&atilde;o</p>

<div class="tabs">
  <button class="tab active" onclick="showTab('tarefas')">Tarefas</button>
  <button class="tab" onclick="showTab('historico')">Hist&oacute;rico</button>
  <button class="tab" onclick="showTab('placar')">Placar</button>
</div>

<div id="msg"></div>

<!-- TAB: Tarefas -->
<div id="tab-tarefas" class="tab-content active">
  <h2>Nova Tarefa</h2>
  <div class="form-row">
    <div class="form-group">
      <label>T&iacute;tulo</label>
      <input type="text" id="newTitulo" placeholder="Nome da tarefa" style="width:200px">
    </div>
    <div class="form-group">
      <label>Pessoa</label>
      <select id="newPessoa"><option value="Bruno">Bruno</option><option value="Nana">Nana</option></select>
    </div>
    <div class="form-group">
      <label>C&ocirc;modo</label>
      <select id="newComodo">
        <option>Banheiro</option><option>Casa</option><option>Cozinha</option>
        <option>Externa</option><option>Quarto</option><option value="Servi&ccedil;o">Servi&ccedil;o</option><option value="Escrit&oacute;rio">Escrit&oacute;rio</option>
      </select>
    </div>
    <div class="form-group">
      <label>Dific.</label>
      <input type="number" id="newDificuldade" value="1" min="1" max="5">
    </div>
    <div class="form-group">
      <label>Freq. Qtd</label>
      <input type="number" id="newFreqQtd" min="0" placeholder="-" style="width:55px">
    </div>
    <div class="form-group">
      <label>Per&iacute;odo</label>
      <select id="newFreqPeriodo"><option value="">-</option><option value="dia">dia</option><option value="semana">semana</option><option value="mes">m&ecirc;s</option></select>
    </div>
    <div class="form-group">
      <label>Sob dem.</label>
      <input type="checkbox" id="newSobDemanda">
    </div>
    <button class="btn btn-primary" onclick="addTask()">Adicionar</button>
  </div>

  <h2>Tarefas Cadastradas <small style="font-size:12px;color:#999">(edite diretamente na tabela)</small></h2>
  <table>
    <thead>
      <tr>
        <th>T&iacute;tulo</th><th>Pessoa</th><th>C&ocirc;modo</th><th>Dif.</th>
        <th>Freq.</th><th>Per&iacute;odo</th><th>Sob Dem.</th><th>Ativa</th><th>Ordem</th><th></th>
      </tr>
    </thead>
    <tbody id="taskList"></tbody>
  </table>
</div>

<!-- TAB: Historico -->
<div id="tab-historico" class="tab-content">
  <h2>Hist&oacute;rico de Conclus&otilde;es</h2>
  <div class="history-filters">
    <select id="histPessoa" onchange="loadHistory()">
      <option value="">Todos</option><option>Bruno</option><option>Nana</option>
    </select>
    <select id="histPeriodo" onchange="loadHistory()">
      <option value="hoje">Hoje</option><option value="semana">Esta semana</option>
      <option value="mes">Este m&ecirc;s</option><option value="tudo">Tudo</option>
    </select>
  </div>
  <div id="historyList"></div>
</div>

<!-- TAB: Placar -->
<div id="tab-placar" class="tab-content">
  <h2>Placar</h2>
  <div class="history-filters">
    <select id="placarPeriodo" onchange="loadPlacar()">
      <option value="hoje">Hoje</option><option value="semana">Esta semana</option>
      <option value="mes">Este m&ecirc;s</option><option value="tudo">Todo o per&iacute;odo</option>
    </select>
  </div>
  <div class="scoreboard">
    <div class="score-card bruno"><div class="name">Bruno</div><div class="pts" id="placarBruno">0</div><div class="label">pontos</div></div>
    <div class="score-card nana"><div class="name">Nana</div><div class="pts" id="placarNana">0</div><div class="label">pontos</div></div>
  </div>
  <div id="placarDetail"></div>
</div>

<script src="config.js"></script>
<script>
const C = window.CASA_CONFIG || {};
const API_BASE = C.API_BASE || "/api/v1";
const BASE_ID = C.BASE_ID || "";
const TABLE_TAREFAS = C.TABLE_TAREFAS || "";
const TABLE_REGISTROS = C.TABLE_REGISTROS || "";

let allTasks = [];
const dirtyRows = new Set();

async function api(method, path, body) {
  const res = await fetch(API_BASE + path, {
    method,
    headers: { "Content-Type": "application/json" },
    body: body ? JSON.stringify(body) : undefined
  });
  if (!res.ok) throw new Error(await res.text());
  return res.status === 204 ? null : res.json();
}

function showMsg(text, ok) {
  const el = document.getElementById("msg");
  el.innerHTML = `<div class="msg ${ok ? 'msg-ok' : 'msg-err'}">${text}</div>`;
  setTimeout(() => el.innerHTML = "", 3000);
}

function showTab(name) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  document.querySelector(`.tab[onclick*="${name}"]`).classList.add('active');
  if (name === 'historico') loadHistory();
  if (name === 'placar') loadPlacar();
}

// Tasks CRUD
async function loadTasks() {
  try {
    const data = await api("GET", `/db/data/noco/${BASE_ID}/${TABLE_TAREFAS}?sort=pessoa,ordem&limit=200`);
    allTasks = data.list || [];
    renderTasks(allTasks);
  } catch(e) { showMsg("Erro: " + e.message, false); }
}

function renderTasks(tasks) {
  const tbody = document.getElementById("taskList");
  dirtyRows.clear();
  tbody.innerHTML = tasks.map(t => `
    <tr id="row-${t.Id}" data-id="${t.Id}">
      <td><input type="text" value="${(t.titulo||'').replace(/"/g,'&quot;')}" data-field="titulo" style="width:180px" oninput="markDirty(${t.Id})"></td>
      <td>
        <select data-field="pessoa" onchange="markDirty(${t.Id})">
          <option ${t.pessoa==='Bruno'?'selected':''}>Bruno</option>
          <option ${t.pessoa==='Nana'?'selected':''}>Nana</option>
        </select>
      </td>
      <td>
        <select data-field="comodo" onchange="markDirty(${t.Id})">
          <option ${t.comodo==='Banheiro'?'selected':''}>Banheiro</option>
          <option ${t.comodo==='Casa'?'selected':''}>Casa</option>
          <option ${t.comodo==='Cozinha'?'selected':''}>Cozinha</option>
          <option ${t.comodo==='Externa'?'selected':''}>Externa</option>
          <option ${t.comodo==='Quarto'?'selected':''}>Quarto</option>
          <option value="Servi\u00e7o" ${t.comodo==='Servi\u00e7o'?'selected':''}>Servi\u00e7o</option>
          <option value="Escrit\u00f3rio" ${t.comodo==='Escrit\u00f3rio'?'selected':''}>Escrit\u00f3rio</option>
        </select>
      </td>
      <td><input type="number" value="${t.dificuldade||1}" min="1" max="5" data-field="dificuldade" oninput="markDirty(${t.Id})"></td>
      <td><input type="number" value="${t.frequencia_qtd||''}" min="0" data-field="frequencia_qtd" placeholder="-" oninput="markDirty(${t.Id})"></td>
      <td>
        <select data-field="frequencia_periodo" onchange="markDirty(${t.Id})">
          <option value="" ${!t.frequencia_periodo?'selected':''}>-</option>
          <option value="dia" ${t.frequencia_periodo==='dia'?'selected':''}>dia</option>
          <option value="semana" ${t.frequencia_periodo==='semana'?'selected':''}>semana</option>
          <option value="mes" ${t.frequencia_periodo==='mes'?'selected':''}>m\u00eas</option>
        </select>
      </td>
      <td style="text-align:center"><input type="checkbox" data-field="sob_demanda" ${t.sob_demanda?'checked':''} onchange="markDirty(${t.Id})"></td>
      <td style="text-align:center"><input type="checkbox" data-field="ativa" ${t.ativa?'checked':''} onchange="markDirty(${t.Id})"></td>
      <td><input type="number" value="${t.ordem||''}" min="0" data-field="ordem" style="width:45px" oninput="markDirty(${t.Id})"></td>
      <td>
        <button class="btn btn-save btn-sm" onclick="saveRow(${t.Id})" style="display:none" id="save-${t.Id}">Salvar</button>
        <button class="btn btn-danger btn-sm" onclick="deleteTask(${t.Id})">Excluir</button>
      </td>
    </tr>
  `).join("");
}

function markDirty(id) {
  dirtyRows.add(id);
  const row = document.getElementById('row-' + id);
  if (row) row.classList.add('dirty');
  const btn = document.getElementById('save-' + id);
  if (btn) btn.style.display = 'inline-block';
}

async function saveRow(id) {
  const row = document.getElementById('row-' + id);
  if (!row) return;
  const body = {};
  row.querySelectorAll('[data-field]').forEach(el => {
    const field = el.dataset.field;
    if (el.type === 'checkbox') {
      body[field] = el.checked;
    } else if (el.type === 'number') {
      body[field] = el.value ? Number(el.value) : null;
    } else {
      body[field] = el.value || null;
    }
  });
  try {
    await api("PATCH", `/db/data/noco/${BASE_ID}/${TABLE_TAREFAS}/${id}`, body);
    row.classList.remove('dirty');
    const btn = document.getElementById('save-' + id);
    if (btn) btn.style.display = 'none';
    dirtyRows.delete(id);
    showMsg("Salvo!", true);
  } catch(e) { showMsg("Erro: " + e.message, false); }
}

async function addTask() {
  const titulo = document.getElementById("newTitulo").value.trim();
  if (!titulo) return showMsg("Preencha o t\u00edtulo", false);
  const body = {
    titulo,
    pessoa: document.getElementById("newPessoa").value,
    comodo: document.getElementById("newComodo").value,
    dificuldade: parseInt(document.getElementById("newDificuldade").value) || 1,
    ativa: true,
    sob_demanda: document.getElementById("newSobDemanda").checked,
    ordem: 99
  };
  const fq = document.getElementById("newFreqQtd").value;
  const fp = document.getElementById("newFreqPeriodo").value;
  if (fq) body.frequencia_qtd = parseInt(fq);
  if (fp) body.frequencia_periodo = fp;
  try {
    await api("POST", `/db/data/noco/${BASE_ID}/${TABLE_TAREFAS}`, body);
    document.getElementById("newTitulo").value = "";
    showMsg("Tarefa adicionada!", true);
    loadTasks();
  } catch(e) { showMsg("Erro: " + e.message, false); }
}

async function deleteTask(id) {
  if (!confirm("Excluir esta tarefa?")) return;
  try {
    await api("DELETE", `/db/data/noco/${BASE_ID}/${TABLE_TAREFAS}/${id}`);
    showMsg("Exclu\u00edda", true);
    loadTasks();
  } catch(e) { showMsg("Erro: " + e.message, false); }
}

// History
function dateFilter(periodo) {
  const now = new Date();
  if (periodo === "hoje") {
    return `(data_hora,gte,exactDate,${now.toISOString().slice(0,10)})`;
  }
  if (periodo === "semana") {
    const day = now.getDay() || 7;
    const mon = new Date(now); mon.setDate(now.getDate() - day + 1);
    return `(data_hora,gte,exactDate,${mon.toISOString().slice(0,10)})`;
  }
  if (periodo === "mes") {
    return `(data_hora,gte,exactDate,${now.toISOString().slice(0,7)}-01)`;
  }
  return "";
}

async function loadHistory() {
  const pessoa = document.getElementById("histPessoa").value;
  const periodo = document.getElementById("histPeriodo").value;
  let where = dateFilter(periodo);
  if (pessoa) where += (where ? "~and" : "") + `(pessoa,eq,${pessoa})`;
  try {
    const data = await api("GET", `/db/data/noco/${BASE_ID}/${TABLE_REGISTROS}?sort=-data_hora&limit=100${where ? '&where=' + where : ''}`);
    const list = data.list || [];
    document.getElementById("historyList").innerHTML = list.length === 0
      ? '<p style="color:#999">Nenhum registro</p>'
      : list.map(r => {
          const dt = r.data_hora ? new Date(r.data_hora) : null;
          const time = dt ? dt.toLocaleTimeString("pt-BR", {hour:"2-digit",minute:"2-digit"}) : "";
          const date = dt ? dt.toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit"}) : "";
          return `<div class="history-item">
            <span class="history-time">${date} ${time}</span>
            <span class="badge badge-${(r.pessoa||'').toLowerCase()}">${r.pessoa||'?'}</span>
            <span class="history-task">${r.titulo||'?'}</span>
            <span class="history-pts">+${r.pontos||0}pt</span>
          </div>`;
        }).join("");
  } catch(e) { document.getElementById("historyList").innerHTML = `<p class="msg-err">${e.message}</p>`; }
}

// Placar
async function loadPlacar() {
  const periodo = document.getElementById("placarPeriodo").value;
  const where = dateFilter(periodo);
  try {
    const data = await api("GET", `/db/data/noco/${BASE_ID}/${TABLE_REGISTROS}?limit=1000${where ? '&where=' + where : ''}&fields=pessoa,pontos,titulo`);
    const list = data.list || [];
    const scores = { Bruno: 0, Nana: 0 };
    const taskCount = { Bruno: {}, Nana: {} };
    for (const r of list) {
      if (r.pessoa && scores[r.pessoa] !== undefined) {
        scores[r.pessoa] += (r.pontos || 0);
        const key = r.titulo || "?";
        taskCount[r.pessoa][key] = (taskCount[r.pessoa][key] || 0) + 1;
      }
    }
    document.getElementById("placarBruno").textContent = scores.Bruno;
    document.getElementById("placarNana").textContent = scores.Nana;

    let detail = "";
    for (const p of ["Bruno", "Nana"]) {
      const entries = Object.entries(taskCount[p]).sort((a,b) => b[1] - a[1]);
      if (entries.length > 0) {
        detail += `<h3 style="color:${p==='Bruno'?'#1565c0':'#c62828'};margin:12px 0 6px">${p}</h3>`;
        detail += entries.map(([t, c]) => `<div style="font-size:13px;padding:2px 0">${t}: <b>${c}x</b></div>`).join("");
      }
    }
    document.getElementById("placarDetail").innerHTML = detail;
  } catch(e) { showMsg("Erro: " + e.message, false); }
}

loadTasks();
</script>
</body>
</html>
